<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการผู้ใช้</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Prompt', sans-serif;
  background:#f8fafc;
  margin:0;
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
}

h2 {
  margin-bottom:10px;
}

.card {
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

select, button, input {
  padding:6px 10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  cursor:pointer;
}

.btn-primary {
  background:#2563eb;
  color:white;
}

.btn-danger {
  background:#dc2626;
  color:white;
}

.topbar {
  margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <a href="dashboard.html">← กลับ Dashboard</a>
  </div>

  <h2>จัดการผู้ใช้</h2>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>ชื่อ</th>
          <th>เลขห้อง</th>
          <th>Role</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

</div>

<script>

let currentUserRole = null;

async function checkAuth() {
  const { data } = await supabaseClient.auth.getUser();

  if (!data?.user) {
    window.location.href = "../auth/login.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", data.user.id)
    .single();

  if (!profile) {
    alert("ไม่พบข้อมูลผู้ใช้");
    return;
  }

  if (profile.role !== "admin" && profile.role !== "super_admin") {
    alert("ไม่มีสิทธิ์");
    window.location.href = "../auth/login.html";
    return;
  }

  currentUserRole = profile.role;
}

async function loadUsers() {
  const { data } = await supabaseClient
    .from("profiles")
    .select("*")
    .order("created_at", { ascending: false });

  const table = document.getElementById("userTable");
  table.innerHTML = "";

  data.forEach(user => {
    let actions = "";

    if (currentUserRole === "super_admin") {
      actions = `
        <select onchange="changeRole('${user.id}', this.value)">
          <option ${user.role==="resident"?"selected":""}>resident</option>
          <option ${user.role==="technician"?"selected":""}>technician</option>
          <option ${user.role==="admin"?"selected":""}>admin</option>
        </select>
        <button class="btn-danger" onclick="resetPassword('${user.id}')">รีเซ็ตรหัส</button>
      `;
    } else {
      actions = `<span>ดูข้อมูล</span>`;
    }

    table.innerHTML += `
      <tr>
        <td>${user.full_name || "-"}</td>
        <td>${user.room_number || "-"}</td>
        <td>${user.role}</td>
        <td>${actions}</td>
      </tr>
    `;
  });
}

async function changeRole(id, role) {
  await supabaseClient
    .from("profiles")
    .update({ role })
    .eq("id", id);

  alert("เปลี่ยน role สำเร็จ");
  loadUsers();
}

async function resetPassword(id) {
  const newPass = prompt("ใส่รหัสผ่านใหม่:");

  if (!newPass) return;

  const { error } = await supabaseClient.auth.admin.updateUserById(id, {
    password: newPass
  });

  if (error) {
    alert("ไม่สำเร็จ");
    return;
  }

  alert("รีเซ็ตรหัสสำเร็จ");
}

checkAuth().then(loadUsers);

</script>

</body>
</html>
