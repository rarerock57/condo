<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ | CHAROEN KRUNG CONDOMINIUM 3</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Prompt', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.10), transparent 35%),
        linear-gradient(135deg, #eef4ff 0%, #f8fafc 45%, #eef2f7 100%);
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-shell {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
    }

    .login-visual {
      position: relative;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.72), rgba(30, 64, 175, 0.68)),
        url('https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      min-height: 680px;
    }

    .login-panel {
      padding: 42px 38px;
      background: rgba(255, 255, 255, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
    }

    .logo-wrap {
      margin-bottom: 22px;
      display: flex;
      justify-content: center;
    }

    .logo-wrap img {
      height: 86px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .login-heading {
      text-align: center;
      margin-bottom: 26px;
    }

    .login-heading h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
    }

    .login-heading p {
      margin: 8px 0 0;
      color: #64748b;
      font-size: 15px;
      line-height: 1.7;
    }

    .field-group {
      margin-bottom: 14px;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }

    .field-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #dbe3ee;
      background: #ffffff;
      font: inherit;
      color: #0f172a;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .field-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
      background: #fff;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #1d4ed8, #1e40af);
    }

    .btn-secondary {
      background: #eef2f7;
      color: #1f2937;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .helper-row {
      margin-top: 16px;
      text-align: center;
      color: #64748b;
      font-size: 13px;
      line-height: 1.7;
    }

    .helper-row span {
      font-weight: 600;
      color: #334155;
    }

    .error-box {
      min-height: 24px;
      margin-top: 14px;
      text-align: center;
      color: #dc2626;
      font-size: 14px;
      font-weight: 500;
    }

    @media (max-width: 980px) {
      .login-shell {
        grid-template-columns: 1fr;
      }

      .login-visual {
        min-height: 240px;
      }

      .login-panel {
        padding: 32px 24px 34px;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .login-shell {
        border-radius: 24px;
      }

      .login-visual {
        min-height: 180px;
      }

      .login-panel {
        padding: 24px 18px 26px;
      }

      .login-heading h1 {
        font-size: 26px;
      }

      .btn-row {
        grid-template-columns: 1fr;
      }

      .logo-wrap img {
        height: 74px;
      }
    }
  </style>
</head>
<body>

  <div class="login-shell">
    <section class="login-visual"></section>

    <section class="login-panel">
      <div class="login-card">
        <div class="logo-wrap">
          <img src="https://img1.pic.in.th/images/-16daae7756d8872a5.png" alt="Charoen Krung Condominium 3 Logo">
        </div>

        <div class="login-heading">
          <h1>เข้าสู่ระบบ</h1>
          <p>กรอกเลขห้องและรหัสผ่านเพื่อเข้าสู่ระบบของอาคาร</p>
        </div>

        <div class="field-group">
          <label class="field-label" for="room">เลขห้อง</label>
          <input class="field-input" type="text" id="room" placeholder="เช่น 6301" autocomplete="username">
        </div>

        <div class="field-group">
          <label class="field-label" for="password">รหัสผ่าน</label>
          <input class="field-input" type="password" id="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password">
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" type="button" onclick="login()">เข้าสู่ระบบ</button>
          <button class="btn btn-secondary" type="button" onclick="goHome()">กลับ</button>
        </div>

        <div class="helper-row">
          กด <span>Enter</span> เพื่อเข้าสู่ระบบ และกด <span>Esc</span> เพื่อล้างค่าที่กรอก
        </div>

        <div class="error-box" id="error"></div>
      </div>
    </section>
  </div>

  <script>
    function goHome() {
      window.location.href = "../index.html";
    }

    function clearForm() {
      document.getElementById("room").value = "";
      document.getElementById("password").value = "";
      document.getElementById("error").textContent = "";
      document.getElementById("room").focus();
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        login();
      }

      if (e.key === "Escape") {
        clearForm();
      }
    });

    async function login() {
      const room = document.getElementById("room").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorBox = document.getElementById("error");

      errorBox.textContent = "";

      if (typeof supabaseClient === "undefined") {
        errorBox.textContent = "ระบบเชื่อมต่อฐานข้อมูลไม่สำเร็จ";
        return;
      }

      if (!room || !password) {
        errorBox.textContent = "กรุณากรอกข้อมูลให้ครบ";
        return;
      }

      const fakeEmail = room + "@condo.local";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email: fakeEmail,
        password: password
      });

      if (error) {
        console.error("Login error:", error);
        errorBox.textContent = "เลขห้องหรือรหัสผ่านไม่ถูกต้อง";
        return;
      }

      await redirectByRole();
    }

    async function redirectByRole() {
      const { data: authData, error: authError } = await supabaseClient.auth.getUser();

      if (authError || !authData?.user) {
        console.error("Auth error:", authError);
        alert("ไม่พบผู้ใช้");
        return;
      }

      const userId = authData.user.id;

      const { data: profile, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .single();

      if (error || !profile) {
        console.error("Profile error:", error);
        alert("ไม่พบข้อมูลผู้ใช้");
        return;
      }

      const role = profile.role;

      if (role === "super_admin" || role === "admin") {
        window.location.href = "../admin/dashboard.html";
        return;
      }

      if (role === "resident") {
        window.location.href = "../resident/dashboard.html";
        return;
      }

      if (role === "technician") {
        window.location.href = "../technician/dashboard.html";
        return;
      }

      alert("ไม่มีสิทธิ์เข้าใช้งาน");
    }
  </script>
</body>
</html>
