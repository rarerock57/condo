<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ | CHAROEN KRUNG CONDOMINIUM 3</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Prompt', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.10), transparent 35%),
        linear-gradient(135deg, #eef4ff 0%, #f8fafc 45%, #eef2f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-shell {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
    }

    .login-visual {
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.85), rgba(30, 64, 175, 0.8)),
        url('https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?q=80&w=1600');
      background-size: cover;
      background-position: center;
      color: white;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .visual-title {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.3;
    }

    .login-panel {
      padding: 60px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-wrap img {
      height: 70px;
    }

    .login-heading {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-heading h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      color: #1e293b;
    }

    .login-heading p {
      margin-top: 8px;
      color: #64748b;
      font-size: 15px;
    }

    .input-label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: #334155;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      margin-bottom: 20px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      font-size: 16px;
      font-family: 'Prompt', sans-serif;
      outline: none;
      transition: all 0.2s;
      background-color: #fcfcfc;
    }

    input:focus {
      border-color: #2563eb;
      background-color: #fff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    input::placeholder {
      color: #94a3b8;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      padding: 16px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      font-family: 'Prompt', sans-serif;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .error-box {
      color: #ef4444;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      min-height: 20px;
    }

    @media(max-width: 900px){
      .login-shell {
        grid-template-columns: 1fr;
        border-radius: 24px;
      }

      .login-visual {
        display: none;
      }

      .login-panel {
        padding: 40px 24px;
      }
    }
  </style>
</head>

<body>

<div class="login-shell">
  <section class="login-visual">
    <div>
      <h2 class="visual-title">ยินดีต้อนรับสู่ ระบบสมาชิก<br>เจริญกรุงคอนโดมิเนียม อาคาร 3</h2>
    </div>
  </section>

  <section class="login-panel">
    <div class="login-card">
      <div class="logo-wrap">
        <img src="https://img1.pic.in.th/images/-16daae7756d8872a5.png" alt="logo">
      </div>

      <div class="login-heading">
        <h1>เข้าสู่ระบบ</h1>
        <p>กรอกเลขห้องและรหัสผ่านเพื่อเข้าสู่ระบบของอาคาร</p>
      </div>

      <label class="input-label" for="room">เลขห้อง</label>
      <input type="text" id="room" placeholder="เช่น 6301" autocomplete="off" readonly onfocus="this.removeAttribute('readonly');">

      <label class="input-label" for="password">รหัสผ่าน</label>
      <input type="password" id="password" placeholder="กรอกรหัสผ่าน" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">

      <div class="btn-row">
        <button class="btn btn-primary" type="button" onclick="login()">เข้าสู่ระบบ</button>
        <button class="btn btn-secondary" type="button" onclick="goHome()">กลับ</button>
      </div>

      <div class="error-box" id="error"></div>
    </div>
  </section>
</div>

<script>
function goHome() {
  window.location.href = "../index.html";
}

function clearForm() {
  document.getElementById("room").value = "";
  document.getElementById("password").value = "";
  document.getElementById("error").textContent = "";
  document.getElementById("room").focus();
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    login();
  }
  if (e.key === "Escape") {
    clearForm();
  }
});

async function login() {
  const room = document.getElementById("room").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("error");

  errorBox.textContent = "";

  if (typeof supabaseClient === "undefined") {
    errorBox.textContent = "ระบบเชื่อมต่อฐานข้อมูลไม่สำเร็จ";
    return;
  }

  if (!room || !password) {
    errorBox.textContent = "กรุณากรอกข้อมูลให้ครบ";
    return;
  }

  const fakeEmail = room + "@condo.local";

  try {
    const { error } = await supabaseClient.auth.signInWithPassword({
      email: fakeEmail,
      password: password
    });

    if (error) {
      errorBox.textContent = "เลขห้องหรือรหัสผ่านไม่ถูกต้อง";
      return;
    }

    await redirectByRole();
  } catch (err) {
    console.error(err);
    errorBox.textContent = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
  }
}

async function redirectByRole() {
  const errorBox = document.getElementById("error");

  const { data: authData, error: authError } = await supabaseClient.auth.getUser();

  if (authError || !authData?.user) {
    console.error("Auth error:", authError);
    errorBox.textContent = "ไม่พบข้อมูลผู้ใช้";
    return;
  }

  const userId = authData.user.id;

  const { data: profile, error: profileError } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", userId)
    .single();

  if (profileError || !profile) {
    console.error("Profile error:", profileError);
    errorBox.textContent = "ไม่พบข้อมูลผู้ใช้ในระบบ";
    await supabaseClient.auth.signOut();
    return;
  }

  if (profile.is_active === false) {
    errorBox.textContent = "บัญชีนี้ถูกระงับการใช้งาน";
    await supabaseClient.auth.signOut();
    return;
  }

  const role = profile.role;

  if (role === "super_admin" || role === "admin") {
    window.location.href = "../admin/dashboard.html";
    return;
  }

  if (role === "resident") {
    window.location.href = "../resident/dashboard.html";
    return;
  }

  if (role === "technician") {
    window.location.href = "../technician/dashboard.html";
    return;
  }

  errorBox.textContent = "ไม่มีสิทธิ์เข้าใช้งาน";
  await supabaseClient.auth.signOut();
}
</script>

</body>
</html>
