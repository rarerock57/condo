<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ | CHAROEN KRUNG CONDOMINIUM 3</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Prompt', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.10), transparent 35%),
        linear-gradient(135deg, #eef4ff 0%, #f8fafc 45%, #eef2f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-shell {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
    }

    .login-visual {
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.85), rgba(30, 64, 175, 0.8)),
        url('https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?q=80&w=1600');
      background-size: cover;
      background-position: center;
      color: white;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .visual-title {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.3;
    }

    .visual-text {
      margin-top: 16px;
      font-size: 18px;
      color: rgba(255,255,255,0.85);
    }

    .login-panel {
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.9);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-wrap img {
      height: 80px;
    }

    .login-heading {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-heading h1 {
      margin: 0;
      font-size: 28px;
    }

    .login-heading p {
      margin-top: 8px;
      color: #64748b;
    }

    input {
      width: 100%;
      padding: 14px 14px;
      margin-bottom: 10px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 18px;
      font-family: 'Prompt', sans-serif;
    }

    input::placeholder {
      font-size: 17px;
      color: #94a3b8;
    }

    .hint {
      font-size: 13px;
      color: #64748b;
      margin-top: -4px;
      margin-bottom: 12px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .btn {
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      font-family: 'Prompt', sans-serif;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
    }

    .error-box {
      color: red;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    @media(max-width: 900px){
      .login-shell {
        grid-template-columns: 1fr;
      }

      .login-visual {
        padding: 30px;
      }
    }
  </style>
</head>

<body>

<div class="login-shell">

  <section class="login-visual">
    <div>
      <h2 class="visual-title">ยินดีต้อนรับสู่<br>ระบบลูกบ้านและเจ้าหน้าที่</h2>
      <p class="visual-text">
        เข้าสู่ระบบเพื่อใช้งานระบบของอาคารและเข้าถึงข้อมูลตามสิทธิ์ของคุณ
      </p>
    </div>
  </section>

  <section class="login-panel">
    <div class="login-card">

      <div class="logo-wrap">
        <img src="https://img1.pic.in.th/images/-16daae7756d8872a5.png" alt="logo">
      </div>

      <div class="login-heading">
        <h1>เข้าสู่ระบบ</h1>
        <p>กรอกเลขห้องและรหัสผ่าน</p>
      </div>

      <input type="text" id="room" placeholder="เลขห้อง เช่น 6301">
      <div class="hint">ตัวอย่าง: อาคาร 6 ชั้น 3 ห้อง 01 → 6301</div>

      <input type="password" id="password" placeholder="รหัสผ่าน">

      <div class="btn-row">
        <button class="btn btn-primary" onclick="login()">เข้าสู่ระบบ</button>
        <button class="btn btn-secondary" onclick="goHome()">กลับ</button>
      </div>

      <div class="error-box" id="error"></div>

    </div>
  </section>

</div>

<script>
function goHome(){
  window.location.href = "../index.html";
}

function clearForm(){
  document.getElementById("room").value = "";
  document.getElementById("password").value = "";
  document.getElementById("error").textContent = "";
}

document.addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
  if(e.key === "Escape") clearForm();
});

async function login(){
  const room = document.getElementById("room").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("error");

  errorBox.textContent = "";

  if(!room || !password){
    errorBox.textContent = "กรุณากรอกข้อมูลให้ครบ";
    return;
  }

  const fakeEmail = room + "@condo.local";

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: fakeEmail,
    password: password
  });

  if(error){
    errorBox.textContent = "เลขห้องหรือรหัสผ่านไม่ถูกต้อง";
    return;
  }

  window.location.href = "../admin/dashboard.html";
}
</script>

</body>
</html>
